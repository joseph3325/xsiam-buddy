commonfields:
  id: ExtractDomain
  version: -1

vcShouldKeepItemLegacyProdMachine: false

name: ExtractDomain
script: |-
  register_module_line('ExtractDomain', 'start', __line__())

  import demistomock as demisto
  from CommonServerPython import *
  from CommonServerUserPython import *
  from urllib.parse import urlparse


  def extract_domain(url: str) -> str:
      """Extract the domain (netloc) from a URL string.

      Handles URLs with and without a scheme. If no scheme is present,
      one is prepended so urlparse can correctly identify the netloc.
      """
      url = url.strip()
      if not url:
          raise ValueError('url argument is required and must not be empty')

      # urlparse requires a scheme to correctly split netloc from path
      if '://' not in url:
          url = 'https://' + url

      parsed = urlparse(url)
      domain = parsed.netloc

      # Strip port number if present (e.g. "example.com:8080" → "example.com")
      if ':' in domain:
          domain = domain.split(':')[0]

      if not domain:
          raise ValueError(f'Could not extract a domain from the provided URL: {url!r}')

      return domain


  def main():
      try:
          args = demisto.args()
          url = args.get('value', '')

          domain = extract_domain(url)

          return_results(CommandResults(
              readable_output=f'### Extracted Domain\n**{domain}**',
              outputs_prefix='ExtractDomain',
              outputs_key_field='Domain',
              outputs={'Domain': domain, 'URL': args.get('value', '')}
          ))

      except Exception as e:
          return_error(f'Failed to extract domain. Error: {str(e)}')


  if __name__ in ('__main__', '__builtin__', 'builtins'):
      main()

  register_module_line('ExtractDomain', 'end', __line__())

type: python
tags:
  - transformer
  - Utility
comment: |
  Extracts the domain from a URL string. Handles URLs with or without a scheme
  (e.g. "https://www.example.com/path?q=1" → "www.example.com"). Use as a
  transformer in playbook task input mappings to pull the domain out of a URL field.
enabled: true

args:
  - supportedModules: []
    name: value
    required: true
    default: true
    description: The URL string from which to extract the domain (e.g. "https://www.example.com/path").

outputs:
  - contextPath: ExtractDomain.Domain
    description: The extracted domain portion of the URL (e.g. "www.example.com").
    type: string
  - contextPath: ExtractDomain.URL
    description: The original URL that was provided as input.
    type: string

scripttarget: 0
subtype: python3
pswd: ""
runonce: false
