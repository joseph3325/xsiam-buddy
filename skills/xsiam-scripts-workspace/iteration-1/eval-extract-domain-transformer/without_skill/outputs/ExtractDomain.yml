commonfields:
  id: ExtractDomain
  version: -1

vcShouldKeepItemLegacyProdMachine: false

name: ExtractDomain
script: |-
  register_module_line('ExtractDomain', 'start', __line__())

  import demistomock as demisto
  from CommonServerPython import *
  from CommonServerUserPython import *
  from urllib.parse import urlparse


  def extract_domain(url: str) -> str:
      """Extract the domain (netloc) from a URL string.

      Handles URLs with and without a scheme. If no scheme is present,
      a temporary one is prepended so urlparse can correctly identify
      the netloc component.

      Args:
          url: The URL string to parse.

      Returns:
          The domain (hostname) extracted from the URL, or the original
          string stripped of leading/trailing whitespace if no domain
          could be identified.
      """
      url = url.strip()
      if not url:
          raise ValueError('value argument is empty')

      # urlparse requires a scheme to correctly identify netloc.
      # If no scheme is present, prepend a placeholder so the parser
      # treats the first component as the host rather than the path.
      if '://' not in url:
          parse_target = 'https://' + url
      else:
          parse_target = url

      parsed = urlparse(parse_target)
      domain = parsed.hostname  # hostname strips port and lowercases

      if not domain:
          raise ValueError(f'Could not extract a domain from: {url!r}')

      return domain


  def main():
      try:
          args = demisto.args()
          value = args.get('value', '')

          if not value:
              raise ValueError('value argument is required')

          domain = extract_domain(str(value))

          return_results(CommandResults(
              readable_output=f'### Extracted Domain\n{domain}',
              outputs_prefix='ExtractDomain',
              outputs={'Domain': domain, 'OriginalURL': str(value)},
          ))

      except Exception as e:
          return_error(f'ExtractDomain failed: {str(e)}')


  if __name__ in ('__main__', '__builtin__', 'builtins'):
      main()

  register_module_line('ExtractDomain', 'end', __line__())

type: python
tags:
  - transformer
  - Utility
comment: |
  Extracts the domain from a URL string. Use as a transformer in playbook task
  input mappings. Pass the full URL via the 'value' argument and the script
  returns only the domain (hostname) portion, e.g. 'https://www.example.com/path'
  becomes 'www.example.com'. URLs without a scheme (e.g. 'example.com/path') are
  also handled correctly.
enabled: true

args:
  - supportedModules: []
    name: value
    required: true
    default: true
    description: The URL string from which the domain should be extracted.

outputs:
  - contextPath: ExtractDomain.Domain
    description: The domain (hostname) extracted from the URL.
    type: string
  - contextPath: ExtractDomain.OriginalURL
    description: The original URL string passed to the transformer.
    type: string

scripttarget: 0
subtype: python3
pswd: ""
runonce: false
