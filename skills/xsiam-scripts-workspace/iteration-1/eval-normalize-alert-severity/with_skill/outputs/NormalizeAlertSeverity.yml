commonfields:
  id: NormalizeAlertSeverity
  version: -1

vcShouldKeepItemLegacyProdMachine: false

name: NormalizeAlertSeverity
script: |-
  register_module_line('NormalizeAlertSeverity', 'start', __line__())

  import demistomock as demisto
  from CommonServerPython import *
  from CommonServerUserPython import *


  SEVERITY_MAP: dict[str, tuple[int, str]] = {
      # Numeric strings
      '1': (1, 'Low'),
      '2': (2, 'Medium'),
      '3': (3, 'High'),
      '4': (4, 'Critical'),
      # Named severities
      'low': (1, 'Low'),
      'medium': (2, 'Medium'),
      'med': (2, 'Medium'),
      'high': (3, 'High'),
      'critical': (4, 'Critical'),
      'crit': (4, 'Critical'),
      # Common aliases
      'info': (1, 'Low'),
      'informational': (1, 'Low'),
      'warn': (2, 'Medium'),
      'warning': (2, 'Medium'),
      'severe': (3, 'High'),
      'urgent': (4, 'Critical'),
      'emergency': (4, 'Critical'),
  }


  def normalize_severity(severity_input: str) -> tuple[int, str]:
      """Map a severity string to a (score, label) tuple.

      Accepts named severities (case-insensitive), numeric strings 1–4,
      and common aliases. Raises ValueError for unrecognised values.
      """
      key = severity_input.strip().lower()
      if key not in SEVERITY_MAP:
          raise ValueError(
              f'Unrecognised severity value: "{severity_input}". '
              f'Accepted values: low, medium, high, critical, 1–4 (and common aliases).'
          )
      return SEVERITY_MAP[key]


  def main():
      try:
          args = demisto.args()
          severity_input = args.get('severity', '')

          if not severity_input:
              raise ValueError('severity argument is required and cannot be empty.')

          score, label = normalize_severity(severity_input)

          result = {
              'Input': severity_input,
              'Score': score,
              'Label': label,
          }

          readable = tableToMarkdown(
              'Normalized Alert Severity',
              [result],
              headers=['Input', 'Score', 'Label'],
          )

          return_results(CommandResults(
              readable_output=readable,
              outputs_prefix='NormalizeAlertSeverity',
              outputs_key_field='Input',
              outputs=result,
          ))

      except Exception as e:
          return_error(f'Failed to normalize severity. Error: {str(e)}')


  if __name__ in ('__main__', '__builtin__', 'builtins'):
      main()

  register_module_line('NormalizeAlertSeverity', 'end', __line__())

type: python
tags:
  - transformer
  - Utility
comment: |
  Maps an alert severity string to a normalised numeric score (1–4) and a human-readable label.

  Accepted inputs (case-insensitive):
  - Named: low, medium, high, critical (plus common aliases such as info, warn, severe, urgent)
  - Numeric: 1, 2, 3, 4

  Score-to-label mapping:
  - 1 → Low
  - 2 → Medium
  - 3 → High
  - 4 → Critical

  Outputs the normalised score and label to context under the NormalizeAlertSeverity prefix.
enabled: true

args:
  - supportedModules: []
    name: severity
    required: true
    default: true
    description: >-
      The alert severity to normalise. Accepts named values (low, medium, high, critical),
      numeric strings (1–4), and common aliases (info, warn, severe, urgent, etc.).
      Case-insensitive.

outputs:
  - contextPath: NormalizeAlertSeverity.Input
    description: The original severity value provided as input.
    type: string
  - contextPath: NormalizeAlertSeverity.Score
    description: Normalised numeric severity score (1 = Low, 2 = Medium, 3 = High, 4 = Critical).
    type: number
  - contextPath: NormalizeAlertSeverity.Label
    description: Human-readable severity label corresponding to the numeric score.
    type: string

