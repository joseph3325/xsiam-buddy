commonfields:
  id: NormalizeAlertSeverity
  version: -1

vcShouldKeepItemLegacyProdMachine: false

name: NormalizeAlertSeverity
script: |-
  register_module_line('NormalizeAlertSeverity', 'start', __line__())

  import demistomock as demisto
  from CommonServerPython import *
  from CommonServerUserPython import *


  SEVERITY_MAP: dict[str, tuple[int, str]] = {
      # Numeric strings
      '1': (1, 'Low'),
      '2': (2, 'Medium'),
      '3': (3, 'High'),
      '4': (4, 'Critical'),
      # Textual labels
      'informational': (1, 'Low'),
      'info': (1, 'Low'),
      'low': (1, 'Low'),
      'medium': (2, 'Medium'),
      'med': (2, 'Medium'),
      'moderate': (2, 'Medium'),
      'high': (3, 'High'),
      'critical': (4, 'Critical'),
      'crit': (4, 'Critical'),
      'unknown': (1, 'Low'),
  }


  def normalize_severity(raw: str) -> tuple[int, str]:
      """Map a raw severity string to a (score, label) tuple.

      Accepts case-insensitive text labels ('high', 'CRITICAL') and numeric
      strings ('1'–'4').  Raises ValueError for unrecognised input.
      """
      key = raw.strip().lower()
      if key in SEVERITY_MAP:
          return SEVERITY_MAP[key]
      raise ValueError(
          f"Unrecognised severity value: '{raw}'. "
          "Expected one of: 1-4, low, medium, high, critical (case-insensitive)."
      )


  def main() -> None:
      try:
          args = demisto.args()
          raw_severity = args.get('severity', '')

          if not raw_severity:
              raise ValueError("'severity' argument is required and must not be empty.")

          score, label = normalize_severity(str(raw_severity))

          result = {
              'Score': score,
              'Label': label,
              'Input': raw_severity,
          }

          return_results(CommandResults(
              readable_output=tableToMarkdown(
                  'Normalized Alert Severity',
                  [result],
                  headers=['Input', 'Score', 'Label'],
                  removeNull=True,
              ),
              outputs_prefix='NormalizeAlertSeverity',
              outputs_key_field='Input',
              outputs=result,
          ))

      except ValueError as e:
          return_error(f'Invalid input: {str(e)}')
      except Exception as e:
          return_error(f'Failed to execute NormalizeAlertSeverity. Error: {str(e)}')


  if __name__ in ('__main__', '__builtin__', 'builtins'):
      main()

  register_module_line('NormalizeAlertSeverity', 'end', __line__())

type: python
tags:
  - transformer
  - Utility
comment: |
  Maps an alert severity string to a normalised numeric score (1–4) and a
  canonical label.

  Accepted input formats:
  - Numeric strings: '1' (Low), '2' (Medium), '3' (High), '4' (Critical)
  - Text labels (case-insensitive): low, medium, high, critical, informational,
    info, med, moderate, crit, unknown

  Outputs the numeric score and label to the context path
  NormalizeAlertSeverity.Score and NormalizeAlertSeverity.Label.
enabled: true

args:
  - supportedModules: []
    name: severity
    required: true
    default: true
    description: >-
      The raw alert severity value to normalise. Accepts numeric strings
      ('1'–'4') or text labels such as 'low', 'medium', 'high', 'critical',
      'informational' (case-insensitive).

outputs:
  - contextPath: NormalizeAlertSeverity.Score
    description: Numeric severity score (1 = Low, 2 = Medium, 3 = High, 4 = Critical).
    type: number
  - contextPath: NormalizeAlertSeverity.Label
    description: Canonical severity label (Low, Medium, High, or Critical).
    type: string
  - contextPath: NormalizeAlertSeverity.Input
    description: The original raw severity value that was passed to the script.
    type: string

scripttarget: 0
subtype: python3
pswd: ""
runonce: false
